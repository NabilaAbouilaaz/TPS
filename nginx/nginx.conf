events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;

    upstream backend {
        zone backend 64k;
        server app1:3001 resolve;
        server app2:3002 resolve;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
